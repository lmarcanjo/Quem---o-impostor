    <meta name="theme-color" content="#0F172A" />
    <script>
      (function() {
        // Fix GitHub Pages path resolving issue (forces trailing slash)
        var l = window.location;
        if (l.hostname.includes('github.io') && !l.pathname.endsWith('/') && l.pathname.split('/').length <= 2 && l.pathname !== '/') {
          window.location.replace(l.protocol + '//' + l.host + l.pathname + '/' + l.search + l.hash);
        }
        
        // Kill previous buggy manual service workers completely before new ones load
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(rs) {
            for(let r of rs) r.unregister();
          });
        }
      })();
    </script>
